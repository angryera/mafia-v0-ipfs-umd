<!doctype html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BnbMafia - Worth</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            dark: {
              50: '#f9fafb',
              100: '#f3f4f6',
              200: '#e5e7eb',
              300: '#d1d5db',
              400: '#9ca3af',
              500: '#6b7280',
              600: '#4b5563',
              700: '#374151',
              800: '#1f2937',
              900: '#111827',
              950: '#030712',
            },
            terminal: {
              green: '#00ff00',
              cyan: '#00ffff',
              yellow: '#ffff00',
              red: '#ff0000',
              bg: '#0d1117',
            }
          }
        }
      }
    }
  </script>
  <style>
    body {
      font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
      background-color: #0d1117;
    }

    .cli-input {
      background-color: #161b22;
      border: 1px solid #30363d;
      color: #00ff00;
      font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
      font-size: 0.75rem;
      padding: 0.25rem 0.5rem;
      border-radius: 0.25rem;
    }

    .cli-input:focus {
      outline: none;
      border-color: #00ffff;
      color: #00ffff;
    }

    .cli-button {
      color: #00ff00;
      transition: all 0.2s;
      background-color: transparent;
    }

    .cli-button:hover:not(:disabled) {
      color: #00ffff;
      border-color: #00ffff;
    }

    .cli-button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .card {
      background-color: #0d1117;
      border: 1px solid #374151;
    }
  </style>
</head>

<body class="min-h-screen text-gray-100">
  <div class="mx-auto px-4 py-8 max-w-5xl container">
    <header class="mb-6">
      <div class="flex items-center gap-2 mb-2">
        <span class="font-mono text-cyan-400 text-sm">$</span>
        <h1 class="font-mono font-bold text-white text-2xl">Worth</h1>
      </div>
      <p class="pl-4 font-mono text-gray-500 text-xs">
        # Run <code class="text-cyan-400">npm run build:browser</code> then serve this folder, open <code
          class="text-cyan-400">worth.html</code>
      </p>
    </header>

    <section class="mb-6 p-4 rounded card">
      <div class="flex flex-col md:flex-row md:items-end gap-3">
        <div class="flex flex-col gap-1">
          <label class="text-gray-400 text-xs">Chain</label>
          <select id="chain" class="cli-input w-40">
            <option value="bnb">bnb</option>
            <option value="pulse">pulse</option>
          </select>
        </div>
        <div class="flex-1 flex flex-col gap-1">
          <label class="text-gray-400 text-xs">Player address</label>
          <input id="player" class="cli-input w-full" placeholder="0x..."
            value="0xad3f2043d1c1f42427f4ca893b637f629647ae16" />
        </div>
        <div class="flex flex-col gap-1">
          <label class="text-gray-400 text-xs">signMsg</label>
          <input id="signMsg" class="cli-input w-72" placeholder="message to sign"
            value='"Sign in bnb.playmafia.io with 0xad3f2043d1c1f42427f4ca893b637f629647ae16 - expire at 1775136249"' />
        </div>
        <div class="flex flex-col gap-1">
          <label class="text-gray-400 text-xs">signature</label>
          <input id="signature" class="cli-input w-72" placeholder="0x..."
            value="0xc030c4f69c35797f931925f2e9c40586e60ca21c69952dd2b72115b64f4d45cb3aa7d7dcff0987f9694ec513ab3e378f5f52a63cd5dcafea8f146707f6ba45331b" />
        </div>
        <button id="load" class="px-3 py-2 border border-dark-700 rounded font-mono text-xs cli-button">
          Load Worth
        </button>
      </div>
      <div id="status" class="mt-3 text-xs text-cyan-400"></div>
    </section>

    <section class="mb-6 flex items-center justify-center">
      <div class="relative w-full max-w-md text-center">
        <div class="mx-auto mb-2 w-10 h-10 rounded-full border border-dark-700 flex items-center justify-center">
          <span class="text-yellow-300 text-lg">★</span>
        </div>
        <div class="mx-auto p-4 rounded card">
          <div class="text-3xl font-bold text-white" id="totalWorth">—</div>
          <div class="text-gray-400 text-xs">Your total worth</div>
        </div>
      </div>
    </section>

    <section class="grid grid-cols-1 gap-4">
      <div class="p-4 rounded card">
        <div class="flex items-center justify-between pb-2 border-b border-dark-700">
          <div class="text-white font-bold">Worth breakdown</div>
          <div class="text-gray-400 text-xs" id="worthBoost">Worth Boost: —</div>
        </div>
        <div class="mt-3 grid grid-cols-1 md:grid-cols-2 gap-3 text-xs">
          <div>
            <div class="text-gray-400 mb-2">Profile</div>
            <div class="space-y-1" id="profileRows"></div>
          </div>
          <div>
            <div class="text-gray-400 mb-2">Assets</div>
            <div class="space-y-1" id="assetRows"></div>
          </div>
        </div>
      </div>

      <div class="p-4 rounded card">
        <div class="text-gray-400 text-xs mb-2">Debug (raw computed object)</div>
        <pre id="debug" class="text-xs overflow-auto max-h-80"></pre>
      </div>
    </section>
  </div>

  <script src="./dist/mafia-utils.js" defer></script>
  <script>
    const els = {
      chain: document.getElementById('chain'),
      player: document.getElementById('player'),
      signMsg: document.getElementById('signMsg'),
      signature: document.getElementById('signature'),
      load: document.getElementById('load'),
      status: document.getElementById('status'),
      totalWorth: document.getElementById('totalWorth'),
      worthBoost: document.getElementById('worthBoost'),
      profileRows: document.getElementById('profileRows'),
      assetRows: document.getElementById('assetRows'),
      debug: document.getElementById('debug'),
    };

    function row(label, value, worth) {
      const div = document.createElement('div');
      div.className = 'grid grid-cols-12 gap-2 items-center';
      div.innerHTML = `
        <span class="col-span-3 text-gray-300">${label}</span>
        <span class="col-span-6 text-white font-semibold text-right">${value}</span>
        <span class="col-span-3 text-white font-semibold text-right">${worth}</span>
      `;
      return div;
    }

    function setLoading(isLoading) {
      els.load.disabled = isLoading;
      els.status.textContent = isLoading ? 'Loading…' : '';
    }

    /**
     * Placeholder: once you provide how to compute each field, wire contract calls here.
     * @returns {Promise<any>}
     */
    // Static config (edit later)
    const RankXPName = [
      "Nobody", "Apprentice", "Pickpocket", "Cloak", "Thief", "Locksmith", "Runner", "Associate", "Dealer", "Fixer",
      "Collector", "Enforcer", "Prospect", "Lieutenant", "Soldier", "Mobster", "Swindler", "Whisperer", "Architect",
      "Hitman", "Assassin", "Commander", "Executioner", "Widowmaker", "Bone collector", "Tactician", "Chief", "Warlord",
      "Capo bastone", "Godfather",
    ];
    // Worth values per rank (index 0 = rankLevel 1 on-chain)
    const RANK_WORTH_VALUES = [
      5, 10, 15, 25, 75, 150, 250, 450, 750, 900, 1100, 1450, 1600, 1750, 1900,
      2050, 2200, 2350, 2500, 2650, 2800, 2950, 3100, 3250, 3400, 3550, 3700,
      3850, 4000, 4150,
    ];
    // Role worth values (from your table)
    // Note: "Regime member" vs "Family member" requires an extra signal we don't have yet,
    // so Normal members default to "Family member" for now.
    const ROLE_WORTH_VALUES = {
      nonMember: 0,
      familyMember: 25,
      regimeMember: 50, // placeholder wiring (needs extra data to detect)
      Capo: 250,
      Capodecina: 500,
      Consigliere: 600,
      Don: 1000,
    };
    const PlayerLevelName = ['Normal', 'Capo', 'Capodecina', 'Consigliere', 'Don'];

    function fmt(v) {
      return v === null || v === undefined ? '—' : String(v);
    }
    function fmtWorth(v) {
      return v === null || v === undefined ? '—' : Number(v).toLocaleString();
    }

    function cashWorthFromBalance(cash) {
      const c = Number(cash ?? 0);
      if (!Number.isFinite(c) || c <= 0) return 0;
      if (c < 100_000) return 5;
      if (c < 500_000) return 15;
      if (c < 5_000_000) return 35;
      if (c < 10_000_000) return 50;
      if (c < 25_000_000) return 75;
      if (c < 100_000_000) return 100;
      return 125;
    }

    async function computeWorth({ chain, player, signMsg, signature }) {
      return await window.MafiaWorth.computeWorth({ chain, player, signMsg, signature });
    }

    async function onLoad() {
      const chain = els.chain.value;
      const player = (els.player.value || '').trim();
      const signMsg = (els.signMsg.value || '').trim();
      const signature = (els.signature.value || '').trim();

      if (!player || !player.startsWith('0x')) {
        els.status.textContent = 'Error: enter a valid player address (0x…)';
        els.status.className = 'mt-3 text-xs text-red-400';
        return;
      }
      if (!signMsg) {
        els.status.textContent = 'Error: enter signMsg';
        els.status.className = 'mt-3 text-xs text-red-400';
        return;
      }
      if (!signature || !signature.startsWith('0x')) {
        els.status.textContent = 'Error: enter a valid signature (0x…)';
        els.status.className = 'mt-3 text-xs text-red-400';
        return;
      }

      els.status.className = 'mt-3 text-xs text-cyan-400';
      setLoading(true);
      try {
        const worth = await computeWorth({ chain, player, signMsg, signature });

        // total
        els.totalWorth.textContent = worth.totalWorth ?? '—';
        els.worthBoost.textContent = `Worth Boost: ${worth.worthBoostPercent ?? '—'}`;

        // rows
        els.profileRows.innerHTML = '';
        // headings
        els.profileRows.innerHTML = '';
        els.profileRows.appendChild(row('Label', 'Value', 'Worth'));
        worth.breakdown.filter((r) => r.group === 'Profile').forEach((r) => {
          els.profileRows.appendChild(row(r.label, fmt(r.value), fmtWorth(r.worth)));
        });

        els.assetRows.innerHTML = '';
        els.assetRows.appendChild(row('Label', 'Value', 'Worth'));
        worth.breakdown.filter((r) => r.group === 'Assets').forEach((r) => {
          els.assetRows.appendChild(row(r.label, fmt(r.value), fmtWorth(r.worth)));
        });

        els.debug.textContent = JSON.stringify(worth, null, 2);
        els.status.textContent = 'Done.';
      } catch (err) {
        els.status.className = 'mt-3 text-xs text-red-400';
        els.status.textContent = `Error: ${err?.message ?? String(err)}`;
      } finally {
        setLoading(false);
      }
    }

    els.load.addEventListener('click', onLoad);
  </script>
</body>

</html>
