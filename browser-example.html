<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>BnbMafia - Browser SDK Demo</title>
  </head>
  <body>
    <h1>BnbMafia Browser SDK</h1>
    <p>
      Run <code>npm run build:browser</code> then serve this folder (e.g.
      <code>npx serve .</code>)
    </p>

    <h2>MafiaInventory</h2>
    <button id="load-items">Load cars (category 15)</button>

    <h2>MafiaProfile</h2>
    <button id="load-users">Load user profiles</button>

    <pre id="output"></pre>

    <!-- Use unified bundle (includes both) -->
    <script src="./dist/mafia-utils.js" defer></script>
    <script>
      const output = document.getElementById("output");

      document.getElementById("load-items").addEventListener("click", async () => {
        output.textContent = "Loading items...";
        try {
          const items = await window.MafiaInventory.getItemsByCategory({
            chain: "bnb",
            categoryId: 15,
            onProgress: (info) => {
              output.textContent = `Items: ${info.fetched} (batch ${info.batchIndex})...`;
            },
          });
          output.textContent = `Done: ${items.length} items\n\nFirst 2:\n${JSON.stringify(items.slice(0, 2), null, 2)}`;
        } catch (err) {
          output.textContent = "Error: " + err.message;
        }
      });

      document.getElementById("load-users").addEventListener("click", async () => {
        output.textContent = "Loading users...";
        try {
          const users = await window.MafiaProfile.getUsersInfo({
            chain: "bnb",
            onProgress: (info) => {
              output.textContent = `Users: ${info.fetched} (batch ${info.batchIndex})...`;
            },
          });
          output.textContent = `Done: ${users.length} users\n\nFirst 2:\n${JSON.stringify(users.slice(0, 2), null, 2)}`;
        } catch (err) {
          output.textContent = "Error: " + err.message;
        }
      });
    </script>
  </body>
</html>
